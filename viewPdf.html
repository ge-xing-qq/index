<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本地相对路径PDF转图片 不上传</title>
<style>
body { padding: 20px; }
#preview img { max-width: 100%; margin: 10px 0; }
</style>
</head>
<body>
<div>正在自动加载 ./pdf/test.pdf 并转图片...</div>
<div id="preview"></div>

<!-- 用兼容版pdf.js -->
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.4.456/build/pdf.min.js"></script>
<script>
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.4.456/build/pdf.worker.min.js";
pdfjsLib.disableWebGL = true;
pdfjsLib.disableStream = true;

const preview = document.getElementById('preview');
const SCALE = 2;

// ========== 在这里写死你的本地PDF相对路径 ==========
const pdfPath = "./pdf/test.pdf";

// 直接加载本地相对路径，不上传、不选文件
async function init() {
  try {
    const pdfDoc = await pdfjsLib.getDocument(pdfPath).promise;
    preview.innerHTML = '';
    // 逐页转图片
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale: SCALE });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport
      }).promise;

      const img = new Image();
      img.src = canvas.toDataURL('image/png');
      preview.appendChild(img);
    }
  } catch (e) {
    preview.innerHTML = '加载失败，请用带跨域参数的Chrome打开';
    console.error(e);
  }
}

init();
</script>
</body>
</html>
