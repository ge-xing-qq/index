<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线PDF转图片（直接转）</title>
<style>
  #preview img { max-width: 100%; }
</style>
</head>
<body>

<div id="preview">正在加载 PDF 并转图片...</div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.4.456/build/pdf.min.js"></script>
<script>
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 
  "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.4.456/build/pdf.worker.min.js";
pdfjsLib.disableWebGL = true;
pdfjsLib.disableStream = true;

// 你要转的 PDF 在线地址
const PDF_URL = `https://ge-xing-qq.github.io/index/pdf/${window.location.search.split('pdf%2F')[1]}`;

(async function () {
  const preview = document.getElementById('preview');
  try {
    // 加载在线PDF
    const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
    preview.innerHTML = '';

    // 逐页转图片
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 }); // 高清
      
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport
      }).promise;

      const img = new Image();
      img.src = canvas.toDataURL('image/png');
      preview.appendChild(img);
    }
  } catch (err) {
    preview.innerHTML = '转换失败：' + err.message;
    console.error(err);
  }
})();
</script>

</body>
</html>
