<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直接使用 ./pdf/xxx.pdf 转图片</title>
<style>
  img { max-width:100%; margin:10px 0; }
</style>
</head>
<body>

<div id="preview"></div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.4.456/build/pdf.min.js"></script>
<script>
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.4.456/build/pdf.worker.min.js";
pdfjsLib.disableWebGL = true;
pdfjsLib.disableRange = true;
pdfjsLib.disableStream = true;

// ==========================================
// 你只需要改这里！直接写相对路径！
// ==========================================
const PDF_PATH = "./pdf/test.pdf";


// 自动加载并转图片
(async function() {
  const preview = document.getElementById('preview');
  preview.innerText = "正在加载：" + PDF_PATH;

  try {
    const pdf = await pdfjsLib.getDocument(PDF_PATH).promise;

    for (let i = 1; i <= pdf.numPages; i++) {
      let page = await pdf.getPage(i);
      let viewport = page.getViewport({ scale: 2 });
      let canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport: viewport
      }).promise;

      let img = new Image();
      img.src = canvas.toDataURL('image/png');
      document.body.appendChild(img);
    }
    preview.innerText = "转换完成！";
  } catch (e) {
    preview.innerText = "失败：必须关闭浏览器安全策略才能用相对路径！\n请看说明！";
    console.error(e);
  }
})();
</script>
</body>
</html>
