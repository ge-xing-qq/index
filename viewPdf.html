<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF预览</title>
</head>
<body style="height: 100vh;overflow-y: auto;">
    <iframe id="iframe" src="" frameborder="0" width="100%" height="100%"></iframe>
    <script>
        // 获取index传过来的参数
        // 验证号码数据（内嵌数据，避免CORS问题）
        const verificationData = {
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234": "index.pdf" ,
            "1234567890ABCDEFGHIJKLMNOPQRST": "index.pdf" ,
            "QWERTYUIOPASDFGHJKLZXCVBNM1234": "index.pdf" ,
            "00000000000000000000000000000000": "index.pdf" 
        }

        const urlParams = window.location.search.split('=')[1];
        console.log(verificationData[urlParams]);
        
        console.log('./pdf/' + verificationData[urlParams]);
        // 设置iframe的src属性
        document.getElementById('iframe').src = './pdf/' + verificationData[urlParams];

    </script>
</body>
</html>
