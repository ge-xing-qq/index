<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF预览</title>
</head>
<body style="height: 100vh;overflow-y: auto;">
    <iframe id="iframe" src="" frameborder="0" width="100%" height="100%"></iframe>
    <script>
        // 获取index传过来的参数
        const urlParams = window.location.search.split('%2F')[2];
        console.log(urlParams);
        // 设置iframe的src属性
        document.getElementById('iframe').src = './pdf/' + urlParams;

    </script>
</body>
</html>
