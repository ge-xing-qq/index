<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 微软雅黑, Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        
        .pdf-container {
            width: 100%;
            height: 100vh;
            background-color: #fff;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            right: 0;
            min-width: 100%;
            min-height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .upload-btn {
            display: inline-block;
            padding: 8px 16px;
            background-color: #28a745;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        
        .upload-btn:hover {
            background-color: #218838;
        }
        
        .toolbar {
            display: flex;
            align-items: center;
        }
        
        .page-info {
            margin-left: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>
    
    <div class="pdf-container" id="pdfContainer">
        <div class="loading" id="loading">请上传PDF文件进行预览</div>
        <embed id="pdfViewer" class="pdf-viewer" style="display: none;" type="application/pdf">
    </div>

    <script>
        
        // 预览PDF
        function previewPDF(file) {
            var loading = document.getElementById('loading');
            var pdfViewer = document.getElementById('pdfViewer');
            var downloadBtn = document.getElementById('downloadBtn');
            
            // 创建文件URL
            var fileURL = URL.createObjectURL(file);
            
            // 显示PDF
            loading.style.display = 'none';
            pdfViewer.style.display = 'block';
            pdfViewer.src = fileURL;
            
            // 显示下载按钮
            downloadBtn.style.display = 'inline-block';
            downloadBtn.setAttribute('data-url', fileURL);
            
            // 更新页面信息
            document.querySelector('.page-info')?.remove();
        }
        
        // 下载PDF
        // document.getElementById('downloadBtn').addEventListener('click', function() {
        //     var url = this.getAttribute('data-url');
        //     if (url) {
        //         var a = document.createElement('a');
        //         a.href = url;
        //         a.download = 'preview.pdf';
        //         document.body.appendChild(a);
        //         a.click();
        //         document.body.removeChild(a);
        //     }
        // });
        
        // 返回按钮
        // document.getElementById('backBtn').addEventListener('click', function() {
        //     // 尝试返回上一页
        //     if (window.history.length > 1) {
        //         window.history.back();
        //     } else {
        //         // 如果没有历史记录，跳转到主页
        //         window.location.href = 'dome.html';
        //     }
        // });
        
        // 监听URL参数中的PDF路径
        window.addEventListener('load', function() {
            var params = new URLSearchParams(window.location.search);
            var pdfPath = params.get('pdf');
            
            if (pdfPath) {
                // 如果URL中包含pdf参数，尝试加载该PDF
                var pdfViewer = document.getElementById('pdfViewer');
                var loading = document.getElementById('loading');
                
                loading.style.display = 'none';
                pdfViewer.style.display = 'block';
                pdfViewer.src = pdfPath;
                
                document.getElementById('downloadBtn').style.display = 'inline-block';
                document.getElementById('downloadBtn').setAttribute('data-url', pdfPath);
            }
        });
    </script>
</body>
</html>
