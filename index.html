<script>
	// 验证码生成函数
	function generateCaptcha() {
		const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
		let captcha = '';
		for (let i = 0; i < 4; i++) {
			captcha += chars.charAt(Math.floor(Math.random() * chars.length));
		}

		// 生成随机颜色
		function getRandomColor() {
			const r = Math.floor(Math.random() * 200) + 30;
			const g = Math.floor(Math.random() * 200) + 30;
			const b = Math.floor(Math.random() * 200) + 30;
			return `rgb(${r}, ${g}, ${b})`;
		}

		// 渲染验证码到DOM
		const captchaDisplay = document.getElementById('captchaDisplay');
		captchaDisplay.innerHTML = '';
		for (let char of captcha) {
			const span = document.createElement('span');
			span.textContent = char;
			span.style.color = getRandomColor();
			span.style.fontWeight = 'bold';
			captchaDisplay.appendChild(span);
		}

		// 存储验证码用于验证
		captchaDisplay.dataset.value = captcha;
	}

	// 输入框获得焦点事件
	function getFocus() {
		this.classList.add('input_focus');
	}

	// 输入框失去焦点事件
	function loseFocus() {
		this.classList.remove('input_focus');
	}

	// 验证输入函数
	function validateInput() {
		const verificationValue = document.getElementById('verificationValue').value.trim();
		const captchaValue = document.getElementById('captchaValue').value.trim();
		const captchaDisplay = document.getElementById('captchaDisplay');
		const storedCaptcha = captchaDisplay.dataset.value;


		// 验证验证码
		if (!captchaValue || captchaValue.toLowerCase() !== storedCaptcha.toLowerCase()) {
			alert('验证码错误，请重新输入');
			generateCaptcha(); // 刷新验证码
			document.getElementById('captchaValue').value = '';
			return;
		}

		// 验证通过，执行查询
		submitCode();
	}

	// 提交查询函数
	function submitCode() {
		const verificationValue = document.getElementById('verificationValue').value.trim();
		console.log('正在查询验证号码：', verificationValue);

		// 在数据中查找匹配的验证号码

		if (verificationValue) {
			// 验证号码存在，跳转到PDF预览页面
			window.location.href = `viewPdf.html?pdf=${verificationValue}`;
		} else {
			// 验证号码不存在
			alert('未找到匹配的验证号码，请检查输入是否正确');
		}
	}

	// 页面加载完成后初始化验证码
	document.addEventListener('DOMContentLoaded', function () {
		generateCaptcha();

		// 为输入框绑定焦点事件
		const inputs = document.querySelectorAll('.input_value');
		inputs.forEach(function (input) {
			input.addEventListener('focus', function () {
				this.classList.add('input_focus');
			});
			input.addEventListener('blur', function () {
				this.classList.remove('input_focus');
			});
		});
	});
</script>
